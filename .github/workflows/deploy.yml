name: Deploy CloudFormation Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stack_name:
        description: 'CloudFormation Stack Name'
        required: true
        type: string
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev

env:
  TEMPLATE_FILE: cft-init.yml

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file ${{ env.TEMPLATE_FILE }} \
            --stack-name sns-sqs-s3-stack-prod \
            --parameter-overrides Environment=prod \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

      - name: Wait for stack deployment
        run: |
          aws cloudformation wait stack-update-complete \
            --stack-name sns-sqs-s3-stack-prod || \
          aws cloudformation wait stack-create-complete \
            --stack-name sns-sqs-s3-stack-prod

      - name: Get stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name sns-sqs-s3-stack-prod \
            --query 'Stacks[0].Outputs' \
            --output table

  deploy-manual:
    name: Manual Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file ${{ env.TEMPLATE_FILE }} \
            --stack-name ${{ github.event.inputs.stack_name }} \
            --parameter-overrides Environment=${{ github.event.inputs.environment }} \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

      - name: Wait for stack deployment
        run: |
          aws cloudformation wait stack-update-complete \
            --stack-name ${{ github.event.inputs.stack_name }} || \
          aws cloudformation wait stack-create-complete \
            --stack-name ${{ github.event.inputs.stack_name }}

      - name: Get stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ github.event.inputs.stack_name }} \
            --query 'Stacks[0].Outputs' \
            --output table
